services:
  # 1. Backend Web Service (Node deployment on Free Tier)
  - type: web
    name: abes-security-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build:backend
    startCommand: npm run start --workspace=backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FACE_PROVIDER
        value: MOCK
      - key: PORT
        value: 5000

  # 2. Frontend Static Site
  - type: web
    name: abes-security-frontend
    env: static
    buildCommand: npm install && npm run build:frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://your-backend-service.onrender.com
